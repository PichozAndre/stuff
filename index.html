<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Dodge Game</title>
<style>
  body { margin: 0; background: #111; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let player = { x: 200, y: 200, size: 20, speed: 3, dashCooldown: 0 };
let keys = {};
let enemies = [];

// Keyboard input
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Spawn enemies
setInterval(() => {
  enemies.push({
    x: Math.random() * canvas.width,
    y: -20,
    size: 20,
    speed: 2 + Math.random() * 2
  });
}, 800);

function getGamepad() {
  return navigator.getGamepads()[0];
}

function getGamepadInput() {
  const gp = getGamepad();
  if (!gp) return { x: 0, y: 0 };
  return {
    x: gp.axes[0],
    y: gp.axes[1]
  };
}

function isButtonPressed(index) {
  const gp = getGamepad();
  if (!gp) return false;
  return gp.buttons[index]?.pressed;
}

function update() {
  let moveX = 0;
  let moveY = 0;

  // WASD
  if (keys["w"]) moveY -= 1;
  if (keys["s"]) moveY += 1;
  if (keys["a"]) moveX -= 1;
  if (keys["d"]) moveX += 1;

  // Gamepad movement
  const gp = getGamepadInput();
  moveX += gp.x;
  moveY += gp.y;

  // Normalize diagonal movement (feels nicer)
  const len = Math.hypot(moveX, moveY);
  if (len > 0) {
    moveX /= len;
    moveY /= len;
  }

  // DASH (A button / L key)
  if ((keys["l"] || isButtonPressed(0)) && player.dashCooldown <= 0) {
    player.x += moveX * 50;
    player.y += moveY * 50;
    player.dashCooldown = 30; // frames cooldown
  }

  // CLEAR SCREEN (Y button / K key)
  if (keys["k"] || isButtonPressed(3)) {
    enemies = [];
  }

  player.x += moveX * player.speed;
  player.y += moveY * player.speed;

  if (player.dashCooldown > 0) player.dashCooldown--;

  // Clamp inside screen
  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // Update enemies
  enemies.forEach(e => e.y += e.speed);

  // Collision
  enemies.forEach(e => {
    if (
      player.x < e.x + e.size &&
      player.x + player.size > e.x &&
      player.y < e.y + e.size &&
      player.y + player.size > e.y
    ) {
      alert("Game Over!");
      enemies = [];
      player.x = 200;
      player.y = 200;
    }
  });

  enemies = enemies.filter(e => e.y < canvas.height);
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Player
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // Enemies
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    ctx.fillRect(e.x, e.y, e.size, e.size);
  });

  // UI
  ctx.fillStyle = "white";
  ctx.font = "16px monospace";
  ctx.fillText("WASD / Stick to move", 10, 20);
  ctx.fillText("L / A = Dash", 10, 40);
  ctx.fillText("K / Y = Clear", 10, 60);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
